# Configuration File

storage:
  type: YAML # YAML, SQLITE, MYSQL, MARIADB
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  table_prefix: "coolauth_"

security:
  encrypt_passwords: true
  encryption_key: "ChangeMe12345678" # Must be 16 chars for TWE
  encryption_type: "BCRYPT" # Options: "OWE" (SHA-256), "TWE" (AES), "BCRYPT"
  bcrypt_rounds: 10 # 10-12 recommended, higher = slower but more secure
  auth_timeout: 40 # Seconds to login before kick
  max_login_attempts: 3 # Kicks after this many wrong passwords
  session_timeout: 220 # Minutes. If 0, sessions are disabled.
  banned_ips: []

# Password strength requirements
password:
  enabled: true
  min_length: 8
  max_length: 32
  require_uppercase: true
  require_lowercase: true
  require_numbers: true
  require_special: false
  special_characters: "!@#$%^&*()_+-=[]{}|;:,.<>?"

# Password recovery system
recovery:
  enabled: false
  discord_webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_HERE"
  cooldown: 3600 # Seconds between requests (1 hour)
  code_expiry: 86400 # Seconds before recovery code expires (24 hours)
  reasons:
    - "I forgot my password"
    - "My account was compromised"
    - "I lost access to my account"
    - "Other"
  gui_title: "&8&lPassword Recovery"
  embed_color: "#3498db"
  embed_title: "🔐 Password Recovery Request"

# Join screen settings
join_screen:
  # For new players (not registered)
  register:
    title: "&b&lWelcome!"
    subtitle: "&7New here? Create an account below"
  # For existing players (registered)
  login:
    title: "&a&lWelcome Back!"
    subtitle: "&7Please login to continue"
  # Action bar messages (shown repeatedly)
  actionbar_register: "&e/register <password> <password>"
  actionbar_login: "&e/login <password>"
  # Detailed instructions sent in chat
  send_chat_instructions: true

messages:
  prefix: "&b[CoolAuth] &7"
  
  # Detailed join instructions (sent in chat)
  register_instructions:
    - ""
    - "&b&l━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - "&f&l  Welcome to the server!"
    - "&b&l━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - ""
    - "&7  You need to &aregister &7to play."
    - ""
    - "&f  Usage: &a/register &e<password> &e<password>"
    - "&f  Example: &a/register &eMyPass123 &eMyPass123"
    - ""
    - "&7  Password requirements:"
    - "&8  • &7Minimum &f%min% &7characters"
    - "&8  • &7Maximum &f%max% &7characters"
    - "&8  • &7Must contain: &f%requirements%"
    - ""
    - "&b&l━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - ""
  
  login_instructions:
    - ""
    - "&a&l━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - "&f&l  Welcome back!"
    - "&a&l━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - ""
    - "&7  Please &alogin &7to continue playing."
    - ""
    - "&f  Usage: &a/login &e<password>"
    - "&f  Example: &a/login &eMyPass123"
    - ""
    - "&7  Forgot your password?"
